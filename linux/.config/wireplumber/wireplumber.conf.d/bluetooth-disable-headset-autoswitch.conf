## Disable WirePlumber's automatic switch to the HSP/HFP headset profile.
## When any app opens the default audio source (Firefox does this preemptively
## for tabs with mic permission), WirePlumber would otherwise flip a connected
## Bluetooth card from A2DP (HD stereo) to headset-head-unit (telephony mono),
## which makes music/video playback sound tinny until the source consumer goes
## away. Keep BT cards in A2DP unconditionally.
##
## To use a Bluetooth mic on demand:
##   pactl set-card-profile bluez_card.XX_XX_XX_XX_XX_XX headset-head-unit

wireplumber.settings = {
  bluetooth.autoswitch-to-headset-profile = false
}
