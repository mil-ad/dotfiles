## "One output, one input — apps never pin themselves; my chosen default wins."
##
## node.stream.restore-target = false
##   Don't pin each application to the last device its stream used. With the
##   default (true), Firefox/Google Meet remember an old sink/source and start
##   there instead of the current default. Off => every stream follows default.
##
## node.restore-default-targets stays at its default (TRUE) on purpose:
##   WirePlumber remembers the device I explicitly chose as default (e.g. the
##   FreeClip earbuds) and re-applies it whenever that device is available —
##   so Bluetooth auto-switches back on connect, even over higher-priority
##   wired devices like the dock. When the earbuds are off, it falls back to
##   the next-best device by priority. Pick the default once with:
##     wpctl set-default <id>     (or choose it in wiremix)
##
## linking.follow-default-target stays at its default (true): existing streams
## move when the default device changes.

wireplumber.settings = {
  node.stream.restore-target = false
}
